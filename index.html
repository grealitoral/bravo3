<meta name="theme-color" content="#1A1F12" media="(prefers-color-scheme: dark)">
<link rel="manifest" href="manifest.json">

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;transition:background .2s,color .2s}
:root{--navy:#18903d;--blue:#378ADD;--pink:#D4537E;--amber:#E8A817;--green:#1D9E75;--border:#EFEFEF;--text2:#888;--text3:#BBB;--card:#FFF;--radius:12px;--bg:#FAFBFC;--text:#1A1A2E;--surface:#F8F8FA;--surface2:#F4F5F7;--border-strong:#E4E4E4}
@media (prefers-color-scheme: dark){
  :root.auto-theme{--navy:#7BA83A;--blue:#5BA3E8;--pink:#E47B9E;--amber:#F4B843;--green:#3DC68E;--border:#2A2F25;--text2:#A0A0A8;--text3:#6A6A72;--card:#1F2419;--bg:#13170F;--text:#E8E8EA;--surface:#1A1F12;--surface2:#252B1A;--border-strong:#383F2C}
}
:root.dark-theme{--navy:#7BA83A;--blue:#5BA3E8;--pink:#E47B9E;--amber:#F4B843;--green:#3DC68E;--border:#2A2F25;--text2:#A0A0A8;--text3:#6A6A72;--card:#1F2419;--bg:#13170F;--text:#E8E8EA;--surface:#1A1F12;--surface2:#252B1A;--border-strong:#383F2C}
:root.light-theme{--navy:#18903d;--blue:#378ADD;--pink:#D4537E;--amber:#E8A817;--green:#1D9E75;--border:#EFEFEF;--text2:#888;--text3:#BBB;--card:#FFF;--bg:#FAFBFC;--text:#1A1A2E;--surface:#F8F8FA;--surface2:#F4F5F7;--border-strong:#E4E4E4}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
@keyframes checkPop{0%{transform:scale(0)}50%{transform:scale(1.2)}100%{transform:scale(1)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#DDD;border-radius:3px}

/* LOGIN */
.login-page{min-height:100vh;min-height:100dvh;width:100%;display:flex;align-items:center;justify-content:center;padding:20px;background:linear-gradient(135deg,#18903d 0%,#1FB04D 50%,#18903d 100%);position:fixed;inset:0;overflow-y:auto}
.login-card{background:transparent;padding:32px 24px;max-width:380px;width:100%;animation:fadeIn .4s ease}
.login-card .logo-big{width:80px;height:80px;border-radius:18px;background:rgba(255,255,255,.15);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:2px solid rgba(255,255,255,.3);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:28px;font-family:'JetBrains Mono',monospace;margin:0 auto 20px;box-shadow:0 8px 32px rgba(0,0,0,.2)}
.login-card h1{text-align:center;font-size:24px;font-weight:800;margin:0 0 4px;color:#fff;text-shadow:0 2px 8px rgba(0,0,0,.2)}
.login-card .sub{text-align:center;font-size:13px;color:rgba(255,255,255,.85);margin:0 0 32px}
.login-card .field label{color:rgba(255,255,255,.9)}
.login-card input[type="text"],.login-card input[type="password"]{background:rgba(255,255,255,.95);border:1px solid rgba(255,255,255,.4);color:#1A1A2E;padding:12px 14px;font-size:15px}
.login-card input[type="text"]:focus,.login-card input[type="password"]:focus{border-color:#fff;box-shadow:0 0 0 3px rgba(255,255,255,.2)}
.login-card .login-foot{text-align:center;font-size:11px;color:rgba(255,255,255,.7)!important;margin-top:16px}
.login-card .btn-login{width:100%;justify-content:center;margin-top:12px;padding:14px;background:#fff;color:#18903d;font-weight:700;font-size:15px;border-radius:12px;border:none;cursor:pointer;transition:all .15s;font-family:inherit}
.login-card .btn-login:hover{background:rgba(255,255,255,.9);transform:translateY(-1px);box-shadow:0 8px 20px rgba(0,0,0,.15)}
.login-card .btn-login:disabled{opacity:.7;cursor:not-allowed;transform:none}
.login-error{background:rgba(255,255,255,.95);color:#A32D2D;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px;display:none;font-weight:600}

/* GENERAL */
.app{max-width:880px;margin:0 auto;padding:0 16px;min-height:100vh;display:flex;flex-direction:column}
header{display:flex;justify-content:space-between;align-items:center;padding:20px 0 16px;border-bottom:1px solid var(--border)}
.logo{display:flex;align-items:center;gap:12px}.logo-mark{width:42px;height:42px;border-radius:10px;background:linear-gradient(135deg,#18903d,#1FB04D);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;font-family:'JetBrains Mono',monospace;letter-spacing:-1px}
.logo h1{font-size:20px;font-weight:800;letter-spacing:-.3px}.logo p{font-size:12px;color:var(--text2);margin-top:1px}
.badge{background:#E6F1FB;color:#185FA5;font-size:11px;font-weight:600;padding:4px 12px;border-radius:16px;white-space:nowrap}
.user-info{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end}
.user-pill{display:flex;align-items:center;gap:6px;background:#F4F5F7;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer}
.user-pill:hover{background:#EAEBEE}
.role-dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.role-dot.admin{background:#E24B4A}.role-dot.art{background:var(--pink)}.role-dot.conductor{background:var(--amber)}.role-dot.agente,.role-dot.tecnico{background:var(--blue)}
.sync-badge{font-size:10px;font-weight:600;padding:4px 10px;border-radius:12px;display:inline-flex;align-items:center;gap:4px}
.sync-badge.ok{background:#EAF3DE;color:#3B6D11}.sync-badge.loading{background:#FEF7E0;color:#854F0B;animation:pulse 1.5s infinite}.sync-badge.error{background:#FCEBEB;color:#A32D2D}.sync-badge.local{background:#F4F5F7;color:#666}

nav{display:flex;gap:2px;padding:12px 0;border-bottom:1px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:thin;scrollbar-color:#CCC transparent;position:relative}nav::-webkit-scrollbar{height:4px}nav::-webkit-scrollbar-track{background:transparent}nav::-webkit-scrollbar-thumb{background:#CCC;border-radius:2px}nav::-webkit-scrollbar-thumb:hover{background:#AAA}
@media(min-width:800px){nav{padding:12px 24px 12px 0;mask-image:linear-gradient(to right,black 92%,transparent 100%);-webkit-mask-image:linear-gradient(to right,black 92%,transparent 100%)}}
.nav-btn{display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:8px;border:none;background:transparent;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .15s;font-family:inherit}.nav-btn:hover{background:#F0F0F0;color:#555}.nav-btn.active{background:var(--navy);color:#fff}.nav-btn svg{width:16px;height:16px;flex-shrink:0}
main{flex:1;padding:20px 0}.section{animation:fadeIn .3s ease}
.field{margin-bottom:14px}.field label{display:block;font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
input[type="text"],input[type="date"],input[type="url"],input[type="password"],select,textarea{padding:9px 12px;border-radius:8px;border:1px solid #E4E4E4;font-size:14px;font-family:inherit;outline:none;background:#fff;width:100%;transition:border-color .15s}input:focus,select:focus,textarea:focus{border-color:var(--blue)}textarea{resize:vertical;min-height:60px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border-radius:10px;border:none;font-size:13px;font-weight:600;cursor:pointer;transition:all .12s;font-family:inherit}.btn:active{transform:scale(.97)}.btn-primary{background:var(--navy);color:#fff}.btn-primary:hover{background:#1FB04D}.btn-success{background:var(--green);color:#fff}.btn-danger{background:transparent;border:1px solid #F5C0D1;color:var(--pink);padding:5px 12px;font-size:11px;border-radius:6px;font-weight:500}.btn-sm{background:transparent;border:1px solid #E4E4E4;color:#555;padding:5px 12px;font-size:12px;border-radius:6px;font-weight:500}.btn-sm:hover{background:#F5F5F5}.btn-lg{padding:14px 28px;font-size:15px;border-radius:12px}.btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.table-wrap{overflow-x:auto;border-radius:var(--radius);border:1px solid var(--border);background:var(--card);-webkit-overflow-scrolling:touch}table{width:100%;border-collapse:collapse}th{padding:10px 8px;font-size:10px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:.6px;text-align:center;background:#F8F8FA;border-bottom:1px solid var(--border)}th:first-child{text-align:left;min-width:180px}td{padding:9px 8px;font-size:13px;border-bottom:1px solid #F9F9F9}tr:hover{background:#FCFCFC}.td-center{text-align:center}
.ck{width:26px;height:26px;border-radius:7px;border:2px solid #D8D8D8;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;transition:all .12s;vertical-align:middle}.ck.on{background:var(--blue);border-color:var(--blue)}.ck svg{width:14px;height:14px}.ck.disabled{opacity:.4;cursor:not-allowed}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0}.driver-tag{font-size:10px;background:#FEF7E0;color:#854F0B;padding:1px 8px;border-radius:10px;font-weight:700;border:1px solid #FAC775}.task-tag{font-size:10px;background:#E6F1FB;color:#185FA5;padding:2px 8px;border-radius:8px;font-weight:600}
.card{border:1px solid var(--border);border-radius:var(--radius);background:var(--card);overflow:hidden;margin-bottom:12px;transition:border-color .15s}.card:hover{border-color:#D0D0D0}.card-header{display:flex;align-items:center;gap:10px;padding:10px 16px;background:#F8F8FA;border-bottom:1px solid #F3F3F3;flex-wrap:wrap}.card-body{padding:8px 16px 12px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:28px}.stat-card{background:#F4F5F7;border-radius:var(--radius);padding:14px 16px}.stat-card .label{font-size:10px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:.5px;display:block}.stat-card .value{font-size:26px;font-weight:800;font-family:'JetBrains Mono',monospace;display:block;margin-top:2px}.chart-box{background:#F8F8FA;border-radius:var(--radius);padding:14px;margin-bottom:8px}.section-head{font-size:13px;font-weight:700;margin:0 0 12px;text-transform:uppercase;letter-spacing:.5px}

/* Wizard styles */
.wizard-hero{border-radius:16px;padding:28px 24px;margin-bottom:24px;color:#fff}.wizard-hero.apertura{background:linear-gradient(135deg,#185FA5,#378ADD)}.wizard-hero.cierre{background:linear-gradient(135deg,#993556,#D4537E)}.wizard-hero.trampilla_open,.wizard-hero.trampilla_close{background:linear-gradient(135deg,#854F0B,#E8A817)}.wizard-hero.info{background:linear-gradient(135deg,#18903d,#1FB04D)}.wizard-hero h2{font-size:20px;font-weight:700;margin:0 0 4px}.wizard-hero p{font-size:13px;opacity:.8;margin:0}
.wizard-selector{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:24px}.wizard-card{border:2px solid var(--border);border-radius:14px;padding:20px;cursor:pointer;transition:all .2s;background:var(--card);text-align:center}.wizard-card:hover{border-color:var(--blue);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.06)}.wizard-card .wc-icon{font-size:32px;margin-bottom:8px;display:block}.wizard-card .wc-title{font-size:15px;font-weight:700;display:block;margin-bottom:4px}.wizard-card .wc-desc{font-size:12px;color:var(--text2)}
.progress-wrap{margin-bottom:24px}.progress-bar-bg{width:100%;height:6px;background:#E8E8E8;border-radius:3px;overflow:hidden}.progress-bar-fill{height:100%;border-radius:3px;transition:width .4s ease;background:var(--blue)}.progress-bar-fill.cierre{background:var(--pink)}.progress-bar-fill.trampilla_open,.progress-bar-fill.trampilla_close{background:var(--amber)}.progress-info{display:flex;justify-content:space-between;align-items:center;margin-top:8px}.progress-info span{font-size:12px;color:var(--text2);font-weight:500}.progress-info strong{font-size:12px;font-family:'JetBrains Mono',monospace}
.step-card{border:1px solid var(--border);border-radius:14px;background:var(--card);padding:24px;margin-bottom:16px;animation:fadeIn .3s ease}.step-number{display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:50%;font-weight:800;font-size:15px;font-family:'JetBrains Mono',monospace;flex-shrink:0}.step-number.apertura{background:#E6F1FB;color:#185FA5}.step-number.cierre{background:#FBEAF0;color:#993556}.step-number.trampilla_open,.step-number.trampilla_close{background:#FEF7E0;color:#854F0B}.step-text{font-size:15px;line-height:1.65;color:#333}
.step-substeps{margin:12px 0 0 4px;padding:10px 0 6px 16px;border-left:3px solid #E8E8E8}.step-substep{font-size:14px;color:#555;padding:4px 0;line-height:1.55}
.step-warning{background:#FEF7E0;border:1px solid #FAC775;border-radius:10px;padding:12px 16px;margin-top:14px;display:flex;align-items:flex-start;gap:10px}.step-warning.danger{background:#FCEBEB;border-color:#F09595}.step-warning .warn-text{font-size:13px;color:#555;line-height:1.55;white-space:pre-line}
.step-confirm{margin-top:16px;padding:14px 16px;background:#F0FFF4;border:2px solid #C0DD97;border-radius:10px;cursor:pointer;display:flex;align-items:center;gap:12px;transition:all .2s;user-select:none}.step-confirm:hover{background:#E5FFE9}.step-confirm.checked{background:#E5FFE9;border-color:var(--green)}.step-confirm .confirm-box{width:26px;height:26px;border-radius:7px;border:2px solid #97C459;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}.step-confirm.checked .confirm-box{background:var(--green);border-color:var(--green);animation:checkPop .3s ease}.step-confirm .confirm-text{font-size:13px;font-weight:600;color:#3B6D11}
.step-nav{display:flex;gap:10px;justify-content:space-between;align-items:center;margin-top:20px;flex-wrap:wrap}
.step-done{text-align:center;padding:40px 20px;animation:fadeIn .4s ease}.step-done h3{font-size:20px;font-weight:700;margin:0 0 8px}.step-done p{font-size:14px;color:var(--text2)}
.setup-box{border:2px solid var(--border);border-radius:16px;padding:28px 24px;max-width:500px;margin:0 auto;background:var(--card);animation:fadeIn .3s ease}.setup-box h3{font-size:18px;font-weight:700;margin:0 0 6px}.setup-box .sub{font-size:13px;color:var(--text2);margin:0 0 24px}
.log-badge{display:inline-block;font-size:10px;font-weight:700;padding:3px 10px;border-radius:8px;text-transform:uppercase}.log-badge.apertura{background:#E6F1FB;color:#185FA5}.log-badge.cierre{background:#FBEAF0;color:#993556}.log-badge.trampilla_open,.log-badge.trampilla_close{background:#FEF7E0;color:#854F0B}
.gen-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:3px 10px;border-radius:8px;background:#EAF3DE;color:#3B6D11}

/* User management */
.user-card{border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:8px;background:var(--card);display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
.role-badge{font-size:10px;font-weight:700;padding:3px 10px;border-radius:8px;text-transform:uppercase}
.role-badge.admin{background:#FCEBEB;color:#A32D2D}.role-badge.art{background:#FBEAF0;color:#993556}.role-badge.conductor{background:#FEF7E0;color:#854F0B}.role-badge.agente{background:#E6F1FB;color:#185FA5}.role-badge.tecnico{background:#E6F1FB;color:#185FA5}

.pdf-card{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border:1px solid var(--border);border-radius:10px;margin-bottom:8px;gap:10px;flex-wrap:wrap;background:var(--card)}.pdf-icon{width:42px;height:42px;border-radius:8px;background:var(--pink);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0}
.video-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:14px}.video-card{border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;background:var(--card)}.video-thumb{background:linear-gradient(135deg,#18903d,#3D3D5C);height:130px;display:flex;align-items:center;justify-content:center;cursor:pointer}.video-thumb:hover{background:linear-gradient(135deg,#1FB04D,#4D4D6C)}.video-body{padding:12px 14px}
.person-row{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border:1px solid var(--border);border-radius:10px;margin-bottom:6px;gap:10px;flex-wrap:wrap;background:var(--card);transition:border-color .15s}.person-row:hover{border-color:#D0D0D0}.mini-stat{font-size:12px;color:#999}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:998;padding:16px}.modal{background:#fff;border-radius:16px;padding:24px;max-width:480px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.15);animation:fadeIn .2s ease;max-height:90vh;overflow-y:auto}.modal h3{font-size:17px;font-weight:700;margin-bottom:16px}.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:10px 24px;border-radius:10px;font-size:13px;font-weight:600;z-index:999;box-shadow:0 8px 30px rgba(0,0,0,.15);animation:slideDown .3s ease;white-space:nowrap;font-family:'DM Sans',sans-serif}
.empty{text-align:center;padding:48px 20px;color:var(--text3);font-size:14px}
footer{padding:16px 0;text-align:center;font-size:11px;color:var(--text3);border-top:1px solid var(--border);margin-top:16px}
.no-access{text-align:center;padding:60px 20px;color:var(--text2)}.no-access h3{font-size:18px;margin:0 0 8px;color:var(--navy)}
.prio-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:8px;text-transform:uppercase}
.prio-badge.alta{background:#FCEBEB;color:#A32D2D}.prio-badge.media{background:#FEF7E0;color:#854F0B}.prio-badge.baja{background:#EAF3DE;color:#3B6D11}
.status-badge{font-size:10px;font-weight:700;padding:3px 10px;border-radius:8px;text-transform:uppercase}
.status-badge.pendiente{background:#FCEBEB;color:#A32D2D}.status-badge.en_curso{background:#FEF7E0;color:#854F0B}.status-badge.completada{background:#EAF3DE;color:#3B6D11}
.status-badge.abierta{background:#FCEBEB;color:#A32D2D}.status-badge.resuelta{background:#EAF3DE;color:#3B6D11}
.status-badge.en_ruta{background:#FEF7E0;color:#854F0B}.status-badge.finalizada{background:#EAF3DE;color:#3B6D11}
.cat-badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:8px;background:#EEEDFE;color:#3C3489}
.comment-box{border:1px solid var(--border);border-radius:10px;padding:12px;margin-top:8px;background:#FAFBFC}
.comment-item{padding:8px 0;border-bottom:1px solid #F3F3F3;font-size:13px}.comment-item:last-child{border:none}
.comment-author{font-weight:600;font-size:12px;color:var(--navy)}.comment-date{font-size:11px;color:#999;margin-left:8px}
.photo-grid{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}.photo-thumb{width:60px;height:60px;border-radius:8px;object-fit:cover;border:1px solid var(--border);cursor:pointer}
.task-card{border:1px solid var(--border);border-radius:12px;background:var(--card);padding:16px;margin-bottom:10px;transition:border-color .15s;cursor:pointer}.task-card:hover{border-color:#CCC}
.task-card .tc-head{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;flex-wrap:wrap;margin-bottom:6px}

// ── API (JSONP para GET, iframe para POST — evita CORS) ──
function apiOk(){return API_URL&&API_URL!=='PEGAR_AQUI_TU_URL'&&API_URL.startsWith('https://')}

function apiGet(params){
  return new Promise((resolve,reject)=>{
    const cb='_gcb'+Date.now()+'_'+Math.random().toString(36).slice(2,6);
    const timeout=setTimeout(()=>{delete window[cb];reject(new Error('Timeout'))},15000);
    window[cb]=function(data){clearTimeout(timeout);delete window[cb];resolve(data)};
    const url=API_URL+'?callback='+cb+(params?'&'+new URLSearchParams(params):'');
    const s=document.createElement('script');
    s.src=url;s.onerror=()=>{clearTimeout(timeout);delete window[cb];reject(new Error('Error de red'))};
    document.head.appendChild(s);s.onload=()=>s.remove();
  });
}

function apiPost(payload){
  return new Promise((resolve,reject)=>{
    const id='_pf'+Date.now();
    const iframe=document.createElement('iframe');
    iframe.name=id;iframe.style.display='none';document.body.appendChild(iframe);
    const form=document.createElement('form');
    form.method='POST';form.action=API_URL;form.target=id;form.style.display='none';
    const input=document.createElement('input');
    input.type='hidden';input.name='payload';input.value=JSON.stringify(payload);
    form.appendChild(input);document.body.appendChild(form);
    const needsResponse=['login','getData','changePassword'].includes(payload.action);
    let responded=false;
    function onMsg(e){if(responded)return;try{const data=typeof e.data==='string'?JSON.parse(e.data):e.data;if(data&&(data.success!==undefined||data.error!==undefined||data.personnel||data.user)){responded=true;window.removeEventListener('message',onMsg);clearTimeout(timer);cleanup();resolve(data)}}catch(ex){}}
    window.addEventListener('message',onMsg);
    iframe.onload=function(){if(responded)return;try{const doc=iframe.contentDocument||iframe.contentWindow.document;const text=doc.body?doc.body.textContent||doc.body.innerText:'';if(text&&text.trim().startsWith('{')){responded=true;window.removeEventListener('message',onMsg);clearTimeout(timer);cleanup();try{resolve(JSON.parse(text.trim()))}catch(ex){resolve({success:true})}return}}catch(ex){}if(!needsResponse&&!responded){responded=true;window.removeEventListener('message',onMsg);clearTimeout(timer);cleanup();resolve({success:true})}};
    const timer=setTimeout(()=>{if(!responded){responded=true;window.removeEventListener('message',onMsg);cleanup();if(needsResponse)reject(new Error('Timeout esperando respuesta'));else resolve({success:true})}},12000);
    function cleanup(){setTimeout(()=>{try{iframe.remove();form.remove()}catch(e){}},1000)}
    form.submit();
  });
}

    ST.routes=d.routes||[];ST.routeLogs=d.routeLogs||[];ST.folders=d.folders||[];ST.manuals=d.manuals||[];ST.faqs=d.faqs||[];
    ST.salidas=d.salidas||[];ST.repostajes=d.repostajes||[];ST.loginLogs=d.loginLogs||[];ST.caducidades=d.caducidades||[];ST.gpsPoints=d.gpsPoints||[];
    try{const lp=localStorage.getItem('pma3_pdfs');if(lp)ST.pdfs=JSON.parse(lp)}catch(e){}
    cacheLocal();setSS('ok');render();
  }catch(e){console.warn('API error:',e);setSS('error');loadLocal();render()}
}
function loadLocal(){try{const r=localStorage.getItem('pma_bravo3_v2');if(r){const d=JSON.parse(r);Object.keys(d).forEach(k=>{if(ST.hasOwnProperty(k))ST[k]=d[k]})}}catch(e){}}
function cacheLocal(){try{const save={...ST};delete save.pdfs;localStorage.setItem('pma_bravo3_v2',JSON.stringify(save))}catch(e){}}

// ── CLOUD OPS ──
async function cloud(action,data){
  if(!apiOk())return;
  setSS('loading');
  try{
    await apiPost({action,...data});
    setSS('ok');
    // Process offline queue if any
    if(ST.offlineQueue.length){processOfflineQueue()}
  }catch(e){
    setSS('error');
    // Queue for later
    ST.offlineQueue.push({action,...data,_ts:Date.now()});
    try{localStorage.setItem('pma3_offline_queue',JSON.stringify(ST.offlineQueue))}catch(ex){}
    showOfflineBar(true);
  }
}
async function processOfflineQueue(){
  if(!ST.offlineQueue.length)return;
  showOfflineBar(false);
  const queue=[...ST.offlineQueue];
  ST.offlineQueue=[];
  for(const op of queue){
    try{await apiPost(op)}catch(e){ST.offlineQueue.push(op)}
  }
  if(ST.offlineQueue.length){
    try{localStorage.setItem('pma3_offline_queue',JSON.stringify(ST.offlineQueue))}catch(e){}
    showOfflineBar(true);
  }else{
    try{localStorage.removeItem('pma3_offline_queue')}catch(e){}
    toast('Cola offline sincronizada');
  }
}
function showOfflineBar(show){
  let bar=document.getElementById('offline-bar');
  if(!bar){bar=document.createElement('div');bar.id='offline-bar';bar.className='offline-bar';document.body.appendChild(bar)}
  if(show){bar.textContent='⚡ '+ST.offlineQueue.length+' operación(es) pendiente(s) de sincronizar';bar.style.display='block'}
  else{bar.style.display='none'}
}

// ── UTILS ──
function fmtDate(d){if(!d)return'';const[y,m,day]=d.split("-");return day+"/"+m+"/"+y}
function fmtDT(iso){if(!iso)return'';const d=new Date(iso);return d.toLocaleDateString('es-ES',{day:'2-digit',month:'2-digit',year:'numeric'})+' '+d.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'})}
function esc(s){const d=document.createElement("div");d.textContent=s||'';return d.innerHTML}
function isLocal(u){return u&&(u.endsWith('.mp4')||u.endsWith('.webm')||u.includes('/videos/'))}
let tt=null;function toast(msg){clearTimeout(tt);let t=document.getElementById("toast");if(!t){t=document.createElement("div");t.id="toast";t.className="toast";document.body.appendChild(t)}t.textContent=msg;t.style.display="block";tt=setTimeout(()=>t.style.display="none",2500)}
function getStats(){const s={};ST.personnel.forEach(p=>s[p.id]={name:p.name,group:p.group,despliegue:0,uso:0,conduccion:0});Object.values(ST.records).forEach(day=>Object.entries(day).forEach(([pid,tasks])=>{if(!s[pid])return;TASKS_DEF.forEach(t=>{if(tasks[t.key])s[pid][t.key]++})}));return s}

async function doLogin(){
  const user=document.getElementById('login-user').value.trim();
  const pass=document.getElementById('login-pass').value;
  const errEl=document.getElementById('login-error');
  const btn=document.getElementById('login-btn');
  if(!user||!pass){errEl.textContent='Introduce usuario y contraseña';errEl.style.display='block';return}
  if(!apiOk()){errEl.textContent='API no configurada';errEl.style.display='block';return}
  // Mostrar estado de carga
  errEl.style.display='none';
  btn.disabled=true;
  btn.innerHTML='<span style="display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top:2px solid #fff;border-radius:50%;animation:spin .8s linear infinite;vertical-align:middle;margin-right:8px"></span>Conectando...';
  try{
    const res=await apiGet({action:'login',user:user,pass:pass});
    if(res.error){errEl.textContent=res.error;errEl.style.display='block';btn.disabled=false;btn.textContent='Acceder';return}
    btn.innerHTML='<span style="display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top:2px solid #fff;border-radius:50%;animation:spin .8s linear infinite;vertical-align:middle;margin-right:8px"></span>Cargando datos...';
    currentUser=res.user;
    localStorage.setItem('pma3_session',JSON.stringify(currentUser));
    cloud('addLoginLog',{log:{user:currentUser.user,name:currentUser.name,rol:currentUser.rol,fecha:new Date().toISOString(),userAgent:navigator.userAgent.slice(0,100)}});
    await loadData();
  }catch(e){errEl.textContent='Error de conexión: '+e.message;errEl.style.display='block';btn.disabled=false;btn.textContent='Acceder'}
}

function doLogout(){
  currentUser=null;
  localStorage.removeItem('pma3_session');
  renderLogin();
}

  const totalLitros=ST.repostajes.reduce((a,r)=>a+r.litros,0);

function rGui(){if(!ST.guideMode)return rGSel();if(ST.guideMode==='info')return rGInfo();if(ST.guideMode==='log')return rGLog();if(ST.guideStep===-1)return rGSetup();const guides={apertura:GUIDE_APERTURA,cierre:GUIDE_CIERRE,trampilla_open:GUIDE_TRAMPILLA_OPEN,trampilla_close:GUIDE_TRAMPILLA_CLOSE};const titles={apertura:"Apertura",cierre:"Cierre",trampilla_open:"Trampilla (apert.)",trampilla_close:"Trampilla (cierre)"};const steps=guides[ST.guideMode];const step=ST.guideStep;const total=steps.length;const cur=steps[step];const pct=Math.round((step/total)*100);const nc=!!cur?.confirm;const ic=!!ST.guideConfirmed[ST.guideMode+'_'+step];const ca=!nc||ic;const done=step>=total;const rn=ST.personnel.find(p=>p.id===ST.guideResponsible)?.name||'—';

  if(done){h+='<div class="step-done"><span style="font-size:48px;display:block;margin-bottom:12px">✅</span><h3>Procedimiento completado</h3><p>Responsable: <strong>'+esc(rn)+'</strong> · Generador: <strong>'+esc(ST.guideGenerator)+'</strong></p><div class="field" style="max-width:400px;margin:20px auto 0;text-align:left"><label>Observaciones</label><textarea id="guide-notes" rows="3" placeholder="Incidencias, comentarios..."></textarea></div><button class="btn btn-success btn-lg" onclick="finishGuide()" style="margin-top:16px">Registrar ✓</button></div>'}

function updateManualSearch(value){
  manualSearch=value;
  // Actualizar solo la lista de manuales sin re-renderizar todo
  const folders=[{id:'all',name:'Todos'},...ST.folders.sort((a,b)=>(a.order||0)-(b.order||0))];
  let filtered=ST.manuals||[];
  if(manualFolder!=='all') filtered=filtered.filter(p=>p.folder===manualFolder);
  if(manualSearch) filtered=filtered.filter(p=>p.name.toLowerCase().includes(manualSearch.toLowerCase()));
  // Buscar el contenedor de la lista (el div después de las pestañas de carpetas)
  const section=document.querySelector('#app .section');
  if(!section)return;
  // Eliminar resultados anteriores y empty
  const oldItems=section.querySelectorAll('.manual-item, .empty');
  oldItems.forEach(el=>el.remove());
  // Insertar nuevos resultados al final del section
  let html='';
  if(!filtered.length)html='<div class="empty">'+(ST.manuals.length?'No se encontraron manuales.':'Sin manuales.')+'</div>';
  else filtered.forEach(m=>{
    const folderName=ST.folders.find(f=>f.id===m.folder)?.name||'General';
    const icon=m.tipo==='youtube'?'VID':'PDF';
    const iconColor=m.tipo==='youtube'?'E24B4A':'D4537E';
    html+='<div class="manual-item"><div style="display:flex;align-items:center;gap:12px;flex:1;min-width:0"><div class="pdf-icon" style="background:#'+iconColor+'">'+icon+'</div><div style="min-width:0;flex:1"><p style="font-size:14px;font-weight:600;margin:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(m.name)+'</p><p style="font-size:12px;color:#999;margin:2px 0 0">'+esc(folderName)+'</p></div></div><div style="display:flex;gap:6px"><a href="'+esc(m.url)+'" target="_blank" class="btn-sm" style="text-decoration:none">Abrir</a>'+(can('uploadManuals')?'<button class="btn-danger" onclick="deleteManual(\''+m.id+'\')">Eliminar</button>':'')+'</div></div>';
  });
  section.insertAdjacentHTML('beforeend',html);
}

// ── Usuarios ──
function editUser(username){const u=ST.users.find(x=>x.user===username);if(!u)return;ST.formData={...u,password:''};ST.modal='editUser';render()}
async function submitUser(editing){
  const _btn=event?.target;btnLoad(_btn,editing?'Guardando...':'Creando...');
  const name=document.getElementById('m-uname').value.trim();
  const user=document.getElementById('m-uuser').value.trim();
  const pass=document.getElementById('m-upass').value;
  const rol=document.getElementById('m-urol').value;
  const personaId=document.getElementById('m-upersona').value;
  const active=document.getElementById('m-uactive').checked;
  const email=document.getElementById('m-uemail')?.value.trim()||'';
  if(!name||!user){btnReset(_btn);return}
  if(!editing&&!pass){toast('La contraseña es obligatoria');btnReset(_btn);return}
  // Construir objeto de usuario individual
  const userData={user,name,rol,personaId,active,email};
  if(pass)userData.password=pass; // Solo enviar password si se cambió
  // Actualizar estado local SIN guardar password
  if(editing){
    const idx=ST.users.findIndex(u=>u.user===user);
    if(idx>=0)ST.users[idx]={...ST.users[idx],name,rol,personaId,active,email};
  }else{
    if(ST.users.find(u=>u.user===user)){toast('El usuario ya existe');btnReset(_btn);return}
    ST.users.push({user,name,rol,personaId,active,email});
  }
  cacheLocal();
  // Usar saveSingleUser para no afectar a otros usuarios
  await cloud('saveSingleUser',{userData});
  ST.modal=null;render();toast(editing?'Usuario actualizado':'Usuario creado');
}
async function doChangePass(){const old=document.getElementById('m-oldpass').value;const np=document.getElementById('m-newpass').value;const np2=document.getElementById('m-newpass2').value;if(!old||!np){toast('Rellena todos los campos');return}if(np!==np2){toast('Las contraseñas no coinciden');return}try{const res=await apiPost({action:'changePassword',user:currentUser.user,oldPass:old,newPass:np});if(res.error){toast(res.error);return}toast('Contraseña cambiada');closeModal()}catch(e){toast('Error: '+e.message)}}

function rTar(){
  const ed=can('createTasks');

  const counts={all:ST.tasks.length,pendiente:ST.tasks.filter(t=>t.status==='pendiente').length,en_curso:ST.tasks.filter(t=>t.status==='en_curso').length,completada:ST.tasks.filter(t=>t.status==='completada').length};
  let h='<div class="section"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px"><h3 class="section-head" style="margin:0">Gestor de tareas</h3>'+(ed?'<button class="btn btn-primary" onclick="ST.modal=\'addTask\';ST.formData={priority:\'media\',status:\'pendiente\'};render()">+ Nueva tarea</button>':'')+'</div>';
  h+='<div class="filter-bar">';
  const fColors={all:'',pendiente:'background:#E24B4A;color:#fff;border-color:#E24B4A',en_curso:'background:#E8A817;color:#fff;border-color:#E8A817',completada:'background:#1D9E75;color:#fff;border-color:#1D9E75'};
  [['all','Todas ('+counts.all+')'],['pendiente','Pendientes ('+counts.pendiente+')'],['en_curso','En curso ('+counts.en_curso+')'],['completada','Completadas ('+counts.completada+')']].forEach(([k,l])=>{
    const active=taskFilter===k;
    const style=active&&fColors[k]?fColors[k]:(active?'background:var(--navy);color:#fff;border-color:var(--navy)':'');
    h+='<span class="filter-chip" style="'+(style)+'" onclick="taskFilter=\''+k+'\';render()">'+l+'</span>';
  });
  h+='</div>';
  if(!tasks.length)h+='<div class="empty">'+(ST.tasks.length?'No hay tareas con ese filtro.':'No hay tareas creadas.')+'</div>';
  else tasks.sort((a,b)=>{const po={alta:0,media:1,baja:2};return (po[a.priority]||1)-(po[b.priority]||1)}).forEach(t=>{
    const assignees=t.assignedTo?t.assignedTo.split(',').map(id=>ST.personnel.find(p=>p.id===id.trim())?.name||id).join(', '):'Sin asignar';
    const comments=ST.taskComments.filter(c=>c.taskId===t.id);
    h+='<div class="task-card" onclick="ST.modal={type:\'viewTask\',id:\''+t.id+'\'};render()"><div class="tc-head"><span class="tc-title">'+esc(t.title)+'</span><div style="display:flex;gap:4px"><span class="prio-badge '+t.priority+'">'+t.priority+'</span><span class="status-badge '+t.status+'">'+t.status.replace('_',' ')+'</span></div></div>';
    if(t.description)h+='<p style="font-size:13px;color:#666;margin:0 0 6px;line-height:1.4">'+esc(t.description).slice(0,120)+(t.description.length>120?'...':'')+'</p>';
    h+='<div class="tc-meta"><span>Asignada: '+esc(assignees)+'</span>';
    if(t.deadline)h+='<span>Límite: '+fmtDate(t.deadline.slice(0,10))+'</span>';
    if(comments.length)h+='<span>'+comments.length+' comentario'+(comments.length>1?'s':'')+'</span>';
    h+='</div></div>';
  });
  h+='</div>';return h;
}

      '<div class="field"><label>Fotos (opcional)</label><input type="file" id="mi-photos" accept="image/*" multiple></div>'+
      '<div class="modal-actions"><button class="btn-sm" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="submitIncident()">Crear incidencia</button></div></div></div>';
  }
  // ── View Incident ──
  if(m?.type==='viewIncident'){
    const inc=ST.incidents.find(x=>x.id===m.id);if(!inc)return'';
    const comments=ST.incidentComments.filter(c=>c.incidentId===inc.id).sort((a,b)=>a.date>b.date?1:-1);
    const photos=ST.incidentPhotos.filter(p=>p.incidentId===inc.id);
    const assignee=inc.assignedTo||'Sin asignar';
    const ed=can('editIncidents');
    let i='<h3>'+esc(inc.title)+'</h3>';
    i+='<div style="display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap"><span class="cat-badge">'+esc(inc.category)+'</span><span class="status-badge '+inc.status+'">'+inc.status.replace('_',' ')+'</span></div>';
    if(inc.description)i+='<p style="font-size:14px;color:#555;line-height:1.6;margin:0 0 12px">'+esc(inc.description)+'</p>';
    i+='<div style="font-size:13px;color:#888;margin-bottom:12px"><div>Reportada por: <strong>'+esc(inc.reportedByName||'')+'</strong></div><div>Asignada a: <strong>'+esc(assignee)+'</strong></div><div>Fecha: '+fmtDT(inc.created)+'</div></div>';
    if(photos.length){i+='<h4 style="font-size:13px;font-weight:700;margin:0 0 6px;color:#999">FOTOS</h4><div class="photo-grid">';photos.forEach(p=>{i+='<img class="photo-thumb" src="'+p.data+'" alt="'+esc(p.name)+'" onclick="window.open(\''+p.data+'\',\'_blank\')">'});i+='</div>';}
    if(ed){
      i+='<div style="display:flex;gap:8px;margin:16px 0;flex-wrap:wrap"><label>Estado:</label><select id="mi-status" onchange="changeIncStatus(\''+inc.id+'\',this.value)">';
      ['abierta','en_curso','resuelta'].forEach(s=>{i+='<option value="'+s+'" '+(inc.status===s?'selected':'')+'>'+s.replace('_',' ')+'</option>'});
      i+='</select><button class="btn-sm" onclick="addIncPhoto(\''+inc.id+'\')">Adjuntar foto</button><input type="file" id="mi-photo-input" accept="image/*" style="display:none"><button class="btn-danger" onclick="deleteIncident(\''+inc.id+'\')">Eliminar</button></div>';
    }
    i+='<h4 style="font-size:13px;font-weight:700;margin:16px 0 8px;text-transform:uppercase;color:#999">Seguimiento ('+comments.length+')</h4>';
    if(comments.length){i+='<div class="comment-box">';comments.forEach(c=>{i+='<div class="comment-item"><span class="comment-author">'+esc(c.authorName)+'</span><span class="comment-date">'+fmtDT(c.date)+'</span><p style="margin:4px 0 0;font-size:13px;color:#444">'+esc(c.text)+'</p></div>'});i+='</div>';}
    i+='<div style="display:flex;gap:8px;margin-top:10px"><input type="text" id="mi-comment" placeholder="Añadir comentario de seguimiento..." style="flex:1"><button class="btn btn-sm" onclick="addIncComment(\''+inc.id+'\')">Enviar</button></div>';
    i+='<div class="modal-actions"><button class="btn-sm" onclick="closeModal()">Cerrar</button></div>';
    return '<div class="overlay" onclick="closeModal()"><div class="modal" style="max-width:560px" onclick="event.stopPropagation()">'+i+'</div></div>';
  }
  // Fallback to original modals
  return _origRMod();
};

async function submitIncident(){
  const _btn=event?.target;btnLoad(_btn,'Creando...');
  const title=document.getElementById('mi-title').value.trim();
  const desc=document.getElementById('mi-desc').value.trim();
  const cat=document.getElementById('mi-cat').value;
  const assigned=document.getElementById('mi-assign').value;
  if(!title){toast('El título es obligatorio');btnReset(_btn);return}
  const inc={id:'inc-'+Date.now(),title,description:desc,category:cat,reportedBy:currentUser.user,reportedByName:currentUser.name,assignedTo:assigned,status:'abierta',created:new Date().toISOString()};
  ST.incidents.push(inc);cacheLocal();await cloud('saveIncident',{incident:inc,notify:true,notifyType:'nueva'});
  // Handle photos
  const photoInput=document.getElementById('mi-photos');
  if(photoInput&&photoInput.files.length){
    const files=Array.from(photoInput.files);
    for(const f of files){
      const data=await readFileAsDataURL(f);
      const photo={id:'ph-'+Date.now()+Math.random().toString(36).slice(2,4),incidentId:inc.id,data,name:f.name,date:new Date().toISOString()};
      ST.incidentPhotos.push(photo);await cloud('addIncidentPhoto',{photo});
    }
  }
  ST.modal=null;render();toast('Incidencia creada');
}
function readFileAsDataURL(file){return new Promise(res=>{const r=new FileReader();r.onload=()=>res(r.result);r.readAsDataURL(file)})}
async function changeIncStatus(id,status){
  const inc=ST.incidents.find(x=>x.id===id);if(!inc)return;inc.status=status;cacheLocal();await cloud('saveIncident',{incident:inc,notify:true,notifyType:status==='resuelta'?'resuelta':'actualizada'});render();toast('Estado actualizado');
}
async function deleteIncident(id){
  ST.incidents=ST.incidents.filter(i=>i.id!==id);ST.incidentComments=ST.incidentComments.filter(c=>c.incidentId!==id);ST.incidentPhotos=ST.incidentPhotos.filter(p=>p.incidentId!==id);cacheLocal();await cloud('deleteIncident',{id});ST.modal=null;render();toast('Incidencia eliminada');
}
async function addIncComment(incId){
  const el=document.getElementById('mi-comment');const text=el?.value.trim();if(!text)return;
  const comment={id:'ic-'+Date.now(),incidentId:incId,author:currentUser.user,authorName:currentUser.name,text,date:new Date().toISOString()};
  ST.incidentComments.push(comment);cacheLocal();await cloud('addIncidentComment',{comment});ST.modal={type:'viewIncident',id:incId};render();toast('Comentario añadido');
}
async function addIncPhoto(incId){
  const input=document.getElementById('mi-photo-input');
  if(!input)return;
  input.onchange=async function(){
    const files=Array.from(input.files);
    for(const f of files){
      const data=await readFileAsDataURL(f);
      const photo={id:'ph-'+Date.now()+Math.random().toString(36).slice(2,4),incidentId:incId,data,name:f.name,date:new Date().toISOString()};
      ST.incidentPhotos.push(photo);cacheLocal();await cloud('addIncidentPhoto',{photo});
    }
    ST.modal={type:'viewIncident',id:incId};render();toast('Foto(s) añadida(s)');
  };
  input.click();
}

// ═══════════ TAB: RUTAS DE CONDUCCIÓN ═══════════
const DIFF_LEVELS=[{k:'facil',l:'Fácil'},{k:'media',l:'Media'},{k:'dificil',l:'Difícil'}];
function rRut(){
  if(!can('viewRoutes'))return'<div class="no-access"><h3>Sin acceso</h3><p>Las rutas solo son visibles para conductores.</p></div>';
  const ed=can('manageRoutes');const canReg=can('registerRoutes');
  let h='<div class="section"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px"><h3 class="section-head" style="margin:0">Rutas de prácticas de conducción</h3>'+(ed?'<button class="btn btn-primary" onclick="ST.modal=\'addRoute\';ST.formData={difficulty:\'media\'};render()">+ Nueva ruta</button>':'')+'</div>';
  if(!ST.routes.length)h+='<div class="empty">No hay rutas definidas.</div>';
  else ST.routes.forEach(rt=>{
    const logs=ST.routeLogs.filter(l=>l.routeId===rt.id);
    const completedBy=logs.map(l=>l.driverName);
    const myLogs=logs.filter(l=>l.driverId===(currentUser.personaId||''));
    h+='<div class="route-card"><div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;flex-wrap:wrap;margin-bottom:8px"><div style="flex:1;min-width:0"><h4 style="font-size:16px;font-weight:700;margin:0 0 4px">'+esc(rt.name)+'</h4>'+
      '<div style="display:flex;gap:4px;flex-wrap:wrap"><span class="diff-badge '+rt.difficulty+'">'+esc(DIFF_LEVELS.find(d=>d.k===rt.difficulty)?.l||rt.difficulty)+'</span></div></div>'+
      (ed?'<button class="btn-danger" onclick="deleteRoute(\''+rt.id+'\')">Eliminar</button>':'')+'</div>';
    if(rt.description)h+='<p style="font-size:14px;color:#555;line-height:1.5;margin:0 0 10px">'+esc(rt.description)+'</p>';
    h+='<div style="margin-bottom:8px">';
    if(rt.distance)h+='<span class="route-stat">📏 '+esc(rt.distance)+'</span>';
    if(rt.time)h+='<span class="route-stat">⏱ '+esc(rt.time)+'</span>';
    h+='<span class="route-stat">✅ '+logs.length+' completada'+(logs.length!==1?'s':'')+'</span></div>';
    if(rt.waypoints)h+='<div style="font-size:13px;color:#666;margin-bottom:8px;padding:10px 12px;background:#F8F8FA;border-radius:8px;line-height:1.5"><strong style="font-size:11px;color:#999;text-transform:uppercase;display:block;margin-bottom:4px">Puntos de paso</strong>'+esc(rt.waypoints)+'</div>';
    if(rt.mapsUrl)h+='<a href="'+esc(rt.mapsUrl)+'" target="_blank" style="display:inline-flex;align-items:center;gap:4px;font-size:13px;color:#378ADD;text-decoration:none;margin-bottom:8px">📍 Ver en Google Maps</a><br>';
    if(completedBy.length){h+='<div class="completion-list">';completedBy.forEach(n=>{h+='<span class="completion-chip">'+esc(n)+'</span>'});h+='</div>';}
    if(canReg)h+='<div style="margin-top:10px"><button class="btn btn-sm" onclick="ST.modal={type:\'regRoute\',id:\''+rt.id+'\'};render()">'+(myLogs.length?'Registrar otra práctica':'Registrar práctica')+'</button></div>';
    h+='</div>';
  });
  h+='</div>';return h;
}

  if(m?.type==='regRoute'){

      '<div class="field"><label>Fecha</label><input type="date" id="mr-date" value="'+new Date().toISOString().slice(0,10)+'"></div>'+
      '<div class="field"><label>Observaciones (opcional)</label><textarea id="mr-notes" rows="2"></textarea></div>'+
      '<div class="modal-actions"><button class="btn-sm" onclick="closeModal()">Cancelar</button><button class="btn btn-success" onclick="submitRouteLog(\''+m.id+'\')">Registrar</button></div></div></div>';
  }

  // ── Manage Folders ──
  if(m==='manageFolders'){
    let i='<h3>Gestionar carpetas</h3>';
    ST.folders.sort((a,b)=>(a.order||0)-(b.order||0)).forEach((f,idx)=>{
      i+='<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #F3F3F3"><span style="flex:1;font-size:14px;font-weight:500">'+esc(f.name)+'</span><button class="btn-danger" onclick="deleteFolder(\''+f.id+'\')">Eliminar</button></div>';
    });
    i+='<div style="display:flex;gap:8px;margin-top:14px"><input type="text" id="mf-name" placeholder="Nombre de la carpeta" style="flex:1"><button class="btn btn-primary" onclick="addFolder()">Añadir</button></div>';
    i+='<div class="modal-actions" style="margin-top:16px"><button class="btn-sm" onclick="closeModal()">Cerrar</button></div>';
    return '<div class="overlay" onclick="closeModal()"><div class="modal" onclick="event.stopPropagation()">'+i+'</div></div>';
  }

  return _origRMod2();
};

let faqSearch='';let faqShowPending=false;
function rFaq(){
  const canApprove=can('approveFAQ');const canPropose=can('proposeFAQ');
  const pending=ST.faqs.filter(f=>!f.approved);
  let filtered=faqShowPending?pending:ST.faqs.filter(f=>f.approved);
  if(faqSearch)filtered=filtered.filter(f=>f.question.toLowerCase().includes(faqSearch.toLowerCase())||f.answer.toLowerCase().includes(faqSearch.toLowerCase()));

  let h='<div class="section"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px"><h3 class="section-head" style="margin:0">Preguntas frecuentes</h3><div style="display:flex;gap:8px">';
  if(canApprove&&pending.length)h+='<button class="btn btn-sm" style="'+(faqShowPending?'background:#FEF7E0;color:#854F0B;border-color:#FAC775':'')+'" onclick="faqShowPending=!faqShowPending;render()">Pendientes ('+pending.length+')</button>';
  if(canPropose)h+='<button class="btn btn-primary" onclick="ST.modal=\'addFAQ\';ST.formData={};render()">+ Proponer pregunta</button>';
  h+='</div></div>';
  h+='<div class="search-box"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input type="text" placeholder="Buscar en FAQs..." value="'+esc(faqSearch)+'" oninput="faqSearch=this.value;render()"></div>';
  if(!filtered.length)h+='<div class="empty">'+(faqShowPending?'No hay preguntas pendientes de aprobación.':'No hay FAQs. '+(canPropose?'Propón la primera pregunta.':''))+'</div>';
  else filtered.forEach(f=>{
    h+='<div class="faq-card '+(f.approved?'':'faq-pending')+'"><div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px"><div style="flex:1"><p class="faq-q">'+esc(f.question)+'</p><p class="faq-a">'+esc(f.answer)+'</p>';
    if(f.category)h+='<span style="font-size:11px;color:#999;margin-top:6px;display:inline-block">'+esc(f.category)+'</span>';

// ═══════════ CHAT IA — GEMINI ═══════════
async function sendChat(){
  const input=document.getElementById('chat-input');
  const text=input?.value.trim();if(!text)return;
  chatMessages.push({role:'user',text});
  input.value='';render();
  scrollChat();

  // Construir contexto con información de la app
  const context=buildContext();
  const messages=chatMessages.map(m=>({role:m.role==='user'?'user':'model',parts:[{text:m.text}]}));
  // Insertar contexto del sistema en el primer mensaje
  const systemPrompt='Eres el asistente inteligente de BASE LITORAL | BRAVO3, un puesto de mando avanzado. Responde en español, de forma concisa y profesional. Tienes acceso a la siguiente información del sistema:\n\n'+context+'\n\nResponde basándote en esta información cuando sea relevante. Si no tienes la respuesta, dilo claramente.';

  const apiMessages=[{role:'user',parts:[{text:systemPrompt}]},{role:'model',parts:[{text:'Entendido. Soy el asistente de BASE LITORAL | BRAVO3. ¿En qué puedo ayudarte?'}]},...messages];

  // Añadir mensaje "escribiendo..."
  chatMessages.push({role:'ai',text:'Pensando...',typing:true});
  render();scrollChat();

  try{
    const url='https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-05-20:generateContent?key='+GEMINI_KEY;
    const res=await fetch(url,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({contents:apiMessages,generationConfig:{maxOutputTokens:1024,temperature:0.7}})
    });
    const data=await res.json();
    // Eliminar el mensaje "pensando"
    chatMessages=chatMessages.filter(m=>!m.typing);
    if(data.candidates&&data.candidates[0]?.content?.parts?.[0]?.text){
      chatMessages.push({role:'ai',text:data.candidates[0].content.parts[0].text});
    }else if(data.error){
      chatMessages.push({role:'ai',text:'Error de la API: '+(data.error.message||'Error desconocido')});
    }else{
      chatMessages.push({role:'ai',text:'No he podido generar una respuesta. Inténtalo de nuevo.'});
    }
  }catch(e){
    chatMessages=chatMessages.filter(m=>!m.typing);
    chatMessages.push({role:'ai',text:'Error de conexión: '+e.message});
  }
  render();scrollChat();
}

function scrollChat(){
  setTimeout(()=>{const el=document.getElementById('chat-msgs');if(el)el.scrollTop=el.scrollHeight},100);
}

function buildContext(){
  let ctx='';
  // Personal
  ctx+='PERSONAL ('+ST.personnel.length+' efectivos):\n';
  Object.entries(GROUPS).forEach(([k,v])=>{
    const members=ST.personnel.filter(p=>p.group===k);
    ctx+=v.label+' ('+members.length+'): '+members.map(p=>p.name+(p.driver?' [conductor]':'')).join(', ')+'\n';
  });
  // FAQs aprobadas
  const approvedFaqs=ST.faqs.filter(f=>f.approved);
  if(approvedFaqs.length){
    ctx+='\nPREGUNTAS FRECUENTES:\n';
    approvedFaqs.forEach(f=>{ctx+='P: '+f.question+'\nR: '+f.answer+'\n\n'});
  }
  // Incidencias abiertas
  const openInc=ST.incidents.filter(i=>i.status!=='resuelta');
  if(openInc.length){
    ctx+='\nINCIDENCIAS ACTIVAS:\n';
    openInc.forEach(i=>{ctx+='- '+i.title+' ['+i.category+'] ('+i.status+') Asignada: '+(i.assignedTo||'sin asignar')+'\n'});
  }
  // Tareas pendientes
  const pendTasks=ST.tasks.filter(t=>t.status!=='completada');
  if(pendTasks.length){
    ctx+='\nTAREAS PENDIENTES:\n';
    pendTasks.forEach(t=>{ctx+='- '+t.title+' ['+t.priority+'] ('+t.status+')\n'});
  }
  // Rutas
  if(ST.routes.length){
    ctx+='\nRUTAS DE CONDUCCIÓN:\n';
    ST.routes.forEach(r=>{ctx+='- '+r.name+': '+r.description+' ('+r.distance+', '+r.difficulty+')\n'});
  }
  // Guía de despliegue (resumen)
  ctx+='\nPROCEDIMIENTO DE APERTURA: '+GUIDE_APERTURA.length+' pasos. Incluye nivelación, despliegue de petacas, montaje de barandillas y escaleras.\n';
  ctx+='PROCEDIMIENTO DE CIERRE: '+GUIDE_CIERRE.length+' pasos. Proceso inverso al de apertura.\n';
  ctx+='CONSIDERACIONES: '+CONSIDERACIONES.join(' | ')+'\n';
  return ctx;
}

  const condId=document.getElementById('ms-cond').value;
  const condName=ST.personnel.find(p=>p.id===condId)?.name||'';
  const origen=document.getElementById('ms-origen').value.trim();
  const destino=document.getElementById('ms-destino').value.trim();
  const motivo=document.getElementById('ms-motivo').value.trim();
  const kmI=parseInt(document.getElementById('ms-kmi').value)||0;
  const ubicSalida=document.getElementById('ms-ubic')?.value.trim()||'';
  if(!condId||!destino||!kmI){toast('Conductor, destino y km de inicio son obligatorios');btnReset(_btn);return}
  const salida={id:'sal-'+Date.now(),conductorId:condId,conductorNombre:condName,origen:origen||'Base Litoral',destino,motivo,kmInicio:kmI,kmFin:0,estado:'en_ruta',comentarios:'',fechaSalida:new Date().toISOString(),fechaLlegada:'',ubicSalida:ubicSalida,ubicLlegada:''};
  ST.salidas.push(salida);cacheLocal();await cloud('saveSalida',{salida});
  // Iniciar tracking GPS automáticamente
  startGpsTracking(salida.id);
  ST.modal=null;render();toast('Salida registrada — tracking GPS activo');
}

async function cerrarSalida(id){
  const _btn=event?.target;btnLoad(_btn,'Finalizando...');
  const s=ST.salidas.find(x=>x.id===id);if(!s)return;
  const kmFin=parseInt(document.getElementById('mc-kmfin').value)||0;
  const comments=document.getElementById('mc-comments').value.trim();
  const ubicLlegada=document.getElementById('mc-ubic')?.value.trim()||'';
  if(!kmFin){toast('Introduce los km de llegada');btnReset(_btn);return}
  if(kmFin<s.kmInicio){toast('Los km de llegada deben ser mayores que los de salida');btnReset(_btn);return}
  s.kmFin=kmFin;s.estado='finalizada';s.comentarios=comments;s.fechaLlegada=new Date().toISOString();s.ubicLlegada=ubicLlegada;
  // Detener tracking GPS si esta es la salida activa
  if(gpsCurrentSalida===id){stopGpsTracking()}
  cacheLocal();await cloud('saveSalida',{salida:s});ST.modal={type:'viewSalida',id};render();toast('Salida finalizada');
}

async function deleteSalida(id){
  ST.salidas=ST.salidas.filter(s=>s.id!==id);ST.repostajes=ST.repostajes.filter(r=>r.salidaId!==id);
  cacheLocal();await cloud('deleteSalida',{id});ST.modal=null;render();toast('Registro eliminado');
}

async function submitRepostaje(salidaId){
  const _btn=event?.target;btnLoad(_btn,'Registrando...');
  const km=parseInt(document.getElementById('mr-km').value)||0;
  const litros=parseFloat(document.getElementById('mr-litros').value)||0;
  const ubic=document.getElementById('mr-ubic').value.trim();
  const lat=document.getElementById('mr-lat').value;
  const lng=document.getElementById('mr-lng').value;
  if(!km||!litros){toast('Kilómetros y litros son obligatorios');btnReset(_btn);return}
  let ticketFoto='';
  const ticketInput=document.getElementById('mr-ticket');
  if(ticketInput&&ticketInput.files.length){
    ticketFoto=await readFileAsDataURL(ticketInput.files[0]);
  }
  const repo={id:'rep-'+Date.now(),salidaId,km,litros,ubicacion:ubic,lat:lat||'',lng:lng||'',fecha:new Date().toISOString(),ticketFoto};
  ST.repostajes.push(repo);cacheLocal();await cloud('addRepostaje',{repostaje:repo});
  ST.modal={type:'viewSalida',id:salidaId};render();toast('Repostaje registrado');
}

function detectarUbicacionCampo(fieldId){
  if(!navigator.geolocation){toast('Geolocalización no disponible');return}
  toast('Obteniendo ubicación...');
  navigator.geolocation.getCurrentPosition(
    async function(pos){
      const lat=pos.coords.latitude;const lng=pos.coords.longitude;
      // Set hidden fields if they exist with matching prefix
      const prefix=fieldId.split('-')[0]+'-';
      const latEl=document.getElementById(prefix+'lat');
      const lngEl=document.getElementById(prefix+'lng');
      if(latEl)latEl.value=lat;
      if(lngEl)lngEl.value=lng;
      try{
        const r=await fetch('https://nominatim.openstreetmap.org/reverse?format=json&lat='+lat+'&lon='+lng+'&zoom=16');
        const d=await r.json();
        const addr=d.display_name||(''+lat.toFixed(4)+', '+lng.toFixed(4));
        document.getElementById(fieldId).value=addr.split(',').slice(0,3).join(',');
      }catch(e){document.getElementById(fieldId).value=lat.toFixed(5)+', '+lng.toFixed(5)}
      toast('Ubicación obtenida');
    },
    function(err){toast('Error: '+err.message);document.getElementById(fieldId).value='No disponible'},
    {enableHighAccuracy:true,timeout:10000}
  );
}

// ═══════════ INFORME DE SALIDAS ═══════════
function generarInforme(){
  const salidas=ST.salidas.sort((a,b)=>a.fechaSalida>b.fechaSalida?1:-1);
  const totalKm=salidas.filter(s=>s.kmFin>0).reduce((a,s)=>a+(s.kmFin-s.kmInicio),0);
  const totalL=ST.repostajes.reduce((a,r)=>a+r.litros,0);
  const consumo=totalKm>0&&totalL>0?Math.round((totalL/totalKm)*100*10)/10:0;
  const now=new Date().toLocaleString('es-ES');

  let txt='';
  txt+='══════════════════════════════════════════════════\n';
  txt+='  INFORME DE SALIDAS — BASE LITORAL | BRAVO3\n';
  txt+='  Generado: '+now+'\n';
  txt+='══════════════════════════════════════════════════\n\n';
  txt+='RESUMEN GENERAL\n';
  txt+='────────────────────────────────────────────────\n';
  txt+='Total de salidas: '+salidas.length+'\n';
  txt+='Finalizadas: '+salidas.filter(s=>s.estado==='finalizada').length+'\n';
  txt+='En ruta: '+salidas.filter(s=>s.estado==='en_ruta').length+'\n';
  txt+='Kilómetros totales: '+totalKm.toLocaleString('es-ES')+' km\n';
  txt+='Litros repostados: '+totalL.toLocaleString('es-ES')+' L\n';
  txt+='Consumo medio: '+(consumo?consumo+' L/100km':'Sin datos suficientes')+'\n';
  txt+='Total repostajes: '+ST.repostajes.length+'\n\n';

  txt+='DETALLE DE SALIDAS\n';
  txt+='══════════════════════════════════════════════════\n\n';

  salidas.forEach((s,idx)=>{
    const kmRec=s.kmFin>0?(s.kmFin-s.kmInicio):0;
    const repos=ST.repostajes.filter(r=>r.salidaId===s.id);
    txt+='── Salida #'+(idx+1)+' ──────────────────────────────\n';
    txt+='Conductor: '+s.conductorNombre+'\n';
    txt+='Ruta: '+s.origen+' → '+s.destino+'\n';
    txt+='Motivo: '+s.motivo+'\n';
    txt+='Estado: '+s.estado.replace('_',' ')+'\n';
    txt+='Km inicio: '+s.kmInicio+' | Km fin: '+(s.kmFin||'—')+' | Recorrido: '+(kmRec||'—')+' km\n';
    txt+='Salida: '+fmtDT(s.fechaSalida)+'\n';
    if(s.fechaLlegada)txt+='Llegada: '+fmtDT(s.fechaLlegada)+'\n';
    if(s.comentarios)txt+='Observaciones: '+s.comentarios+'\n';
    if(repos.length){
      txt+='Repostajes:\n';
      repos.forEach(r=>{
        txt+='   ⛽ '+r.litros+' L a '+r.km+' km';
        if(r.ubicacion)txt+=' — '+r.ubicacion;
        txt+=' ('+fmtDT(r.fecha)+')\n';
      });
    }
    txt+='\n';
  });

  // Tabla resumen por conductor
  const conductores={};
  salidas.forEach(s=>{
    if(!conductores[s.conductorNombre])conductores[s.conductorNombre]={salidas:0,km:0,litros:0};
    conductores[s.conductorNombre].salidas++;
    if(s.kmFin>0)conductores[s.conductorNombre].km+=(s.kmFin-s.kmInicio);
  });
  ST.repostajes.forEach(r=>{
    const sal=salidas.find(s=>s.id===r.salidaId);
    if(sal&&conductores[sal.conductorNombre])conductores[sal.conductorNombre].litros+=r.litros;
  });

  txt+='RESUMEN POR CONDUCTOR\n';
  txt+='══════════════════════════════════════════════════\n';
  Object.entries(conductores).forEach(([nombre,data])=>{
    txt+=nombre+': '+data.salidas+' salida(s), '+data.km+' km, '+data.litros+' L\n';
  });

  // Descargar como archivo de texto
  const blob=new Blob([txt],{type:'text/plain;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download='informe_salidas_bravo3_'+new Date().toISOString().slice(0,10)+'.txt';
  document.body.appendChild(a);a.click();a.remove();
  URL.revokeObjectURL(url);
  toast('Informe descargado');
}

function rDash(){
  const enRuta=ST.salidas.filter(s=>s.estado==='en_ruta');
  const tasksPend=ST.tasks.filter(t=>t.status==='pendiente');
  const tasksUrg=tasksPend.filter(t=>t.priority==='alta');
  const incOpen=ST.incidents.filter(i=>i.status!=='resuelta');

  const now=new Date();
  const proxDeadlines=ST.tasks.filter(t=>t.deadline&&t.status!=='completada').sort((a,b)=>a.deadline>b.deadline?1:-1).slice(0,5);

  const proxCad=(ST.caducidades||[]).filter(c=>{
    if(!c.fecha)return false;
    const d=new Date(c.fecha);const diff=(d-now)/(1000*60*60*24);

  if(tasksUrg.length){

    tasksUrg.slice(0,5).forEach(t=>{h+='<div class="dash-item"><span>'+esc(t.title)+'</span><span class="prio-badge alta">alta</span></div>'});
    h+='</div>';
  }
  // Tareas pendientes
  if(tasksPend.length){
    h+='<div class="dash-card"><h4>📋 Tareas pendientes ('+tasksPend.length+')</h4>';
    tasksPend.slice(0,5).forEach(t=>{h+='<div class="dash-item"><span>'+esc(t.title)+'</span><span class="prio-badge '+t.priority+'">'+t.priority+'</span></div>'});
    if(tasksPend.length>5)h+='<p style="font-size:12px;color:#999;margin:6px 0 0;text-align:center">y '+(tasksPend.length-5)+' más...</p>';
    h+='</div>';
  }
  // Incidencias abiertas
  if(incOpen.length){
    h+='<div class="dash-card"><h4>⚠️ Incidencias abiertas ('+incOpen.length+')</h4>';
    incOpen.slice(0,5).forEach(i=>{h+='<div class="dash-item"><span>'+esc(i.title)+'</span><span class="cat-badge">'+esc(i.category)+'</span></div>'});
    h+='</div>';

// ═══════════ TAB: CALENDARIO ═══════════
let calYear=new Date().getFullYear();let calMonth=new Date().getMonth();
function rCal(){
  const months=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const days=['L','M','X','J','V','S','D'];
  const firstDay=new Date(calYear,calMonth,1);
  let startDay=firstDay.getDay()-1;if(startDay<0)startDay=6;
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const today=new Date();const todayStr=today.toISOString().slice(0,10);

  // Build events map
  const events={};
  function addEv(dateStr,type,label){if(!dateStr)return;const d=dateStr.slice(0,10);if(!events[d])events[d]=[];events[d].push({type,label})}
  // Procedimientos
  ST.guideLogs.forEach(l=>{addEv(l.datetime,'proc',GUIDE_LABELS[l.type]||l.type)});
  // Salidas
  ST.salidas.forEach(s=>{addEv(s.fechaSalida,'salida',s.origen+'→'+s.destino)});
  // Tareas con deadline
  ST.tasks.filter(t=>t.deadline).forEach(t=>{addEv(t.deadline,'tarea',t.title)});
  // Registros
  Object.keys(ST.records).forEach(d=>{addEv(d,'registro','Registro')});
  // Caducidades
  (ST.caducidades||[]).forEach(c=>{if(c.fecha)addEv(c.fecha,'cad',c.nombre)});

  let h='<div class="section"><div class="cal-nav"><button class="btn btn-sm" onclick="calMonth--;if(calMonth<0){calMonth=11;calYear--}render()">← Anterior</button><h3>'+months[calMonth]+' '+calYear+'</h3><button class="btn btn-sm" onclick="calMonth++;if(calMonth>11){calMonth=0;calYear++}render()">Siguiente →</button></div>';
  h+='<div class="cal-grid">';
  days.forEach(d=>{h+='<div class="cal-header">'+d+'</div>'});
  for(let i=0;i<startDay;i++)h+='<div class="cal-day empty"></div>';
  for(let d=1;d<=daysInMonth;d++){
    const ds=calYear+'-'+String(calMonth+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const isToday=ds===todayStr;
    const evs=events[ds]||[];
    h+='<div class="cal-day'+(isToday?' today':'')+(evs.length?' has-event':'')+'" onclick="'+(evs.length?"showCalDay('"+ds+"')":'')+'" title="'+(evs.length?evs.length+' evento(s)':'')+'">'+d+'</div>';
  }
  h+='</div>';

  // Legend
  h+='<div style="display:flex;gap:16px;margin-top:16px;flex-wrap:wrap;font-size:12px;color:#888"><span>● = día con actividad</span></div>';
  h+='</div>';return h;
}
function showCalDay(ds){
  // Build events for this day
  const evs=[];
  ST.guideLogs.filter(l=>l.datetime&&l.datetime.slice(0,10)===ds).forEach(l=>{evs.push({type:'Procedimiento',desc:(GUIDE_LABELS[l.type]||l.type)+' — '+l.responsible})});
  ST.salidas.filter(s=>s.fechaSalida&&s.fechaSalida.slice(0,10)===ds).forEach(s=>{evs.push({type:'Salida',desc:s.origen+' → '+s.destino+' ('+s.conductorNombre+')'})});
  ST.tasks.filter(t=>t.deadline&&t.deadline.slice(0,10)===ds).forEach(t=>{evs.push({type:'Tarea',desc:t.title+' ['+t.priority+']'})});
  if(ST.records[ds])evs.push({type:'Registro',desc:Object.keys(ST.records[ds]).length+' efectivos registrados'});
  (ST.caducidades||[]).filter(c=>c.fecha&&c.fecha.slice(0,10)===ds).forEach(c=>{evs.push({type:'Caducidad',desc:c.nombre})});

  let i='<h3>'+fmtDate(ds)+'</h3>';
  if(!evs.length)i+='<p style="color:#999">Sin eventos este día.</p>';
  else evs.forEach(e=>{i+='<div class="dash-item"><span class="cat-badge">'+esc(e.type)+'</span><span style="flex:1;margin-left:8px">'+esc(e.desc)+'</span></div>'});
  i+='<div class="modal-actions"><button class="btn-sm" onclick="closeModal()">Cerrar</button></div>';
  ST.modal={type:'_custom',html:i};render();
}

function rCad(){
  const ed=can('editRecords');
  const now=new Date();
  const items=(ST.caducidades||[]).sort((a,b)=>{if(!a.fecha)return 1;if(!b.fecha)return -1;return a.fecha>b.fecha?1:-1});
  let h='<div class="section"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px"><h3 class="section-head" style="margin:0">Control de caducidades y revisiones</h3>'+(ed?'<button class="btn btn-primary" onclick="ST.modal=\'addCaducidad\';ST.formData={};render()">+ Añadir</button>':'')+'</div>';
  if(!items.length)h+='<div class="empty">Sin elementos registrados. '+(ed?'Pulsa "+ Añadir" para registrar la primera caducidad.':'')+'</div>';
  else items.forEach(c=>{
    const d=c.fecha?new Date(c.fecha):null;
    const diff=d?Math.ceil((d-now)/(1000*60*60*24)):999;
    const cls=diff<0?'cad-expired':diff<=30?'cad-soon':'cad-ok';
    const statusText=diff<0?'VENCIDO hace '+Math.abs(diff)+' días':diff===0?'VENCE HOY':diff<=30?'Vence en '+diff+' días':'OK — '+diff+' días';
    const statusColor=diff<0?'#A32D2D':diff<=30?'#854F0B':'#1D9E75';
    h+='<div class="cad-card '+cls+'"><div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;flex-wrap:wrap"><div><p style="font-size:15px;font-weight:700;margin:0 0 4px">'+esc(c.nombre)+'</p>';
    if(c.descripcion)h+='<p style="font-size:13px;color:#666;margin:0 0 6px">'+esc(c.descripcion)+'</p>';
    h+='<p style="margin:0"><span class="cad-date">'+( c.fecha?fmtDate(c.fecha.slice(0,10)):'Sin fecha')+'</span> <span style="font-size:12px;font-weight:600;color:'+statusColor+'">'+statusText+'</span></p></div>';
    if(ed)h+='<div style="display:flex;gap:4px"><button class="btn-sm" onclick="editCaducidad(\''+c.id+'\')">Editar</button><button class="btn-danger" onclick="deleteCaducidad(\''+c.id+'\')">Eliminar</button></div>';
    h+='</div></div>';
  });
  h+='</div>';return h;
}

async function submitCaducidad(){
