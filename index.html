// ═══════════ MAPA DEL TRACK GPS ═══════════
function showGpsTrack(salidaId){
  const pts=(ST.gpsPoints||[]).filter(function(g){return g.salidaId===salidaId}).sort(function(a,b){return a.fecha>b.fecha?1:-1});
  const sal=(ST.salidas||[]).find(function(s){return s.id===salidaId});
  if(!pts.length){toast('No hay puntos GPS para esta salida');return}
  // Calcular distancia total recorrida
  let distancia=0;
  for(let i=1;i<pts.length;i++){
    const p1=pts[i-1],p2=pts[i];
    const R=6371;
    const dLat=(p2.lat-p1.lat)*Math.PI/180;
    const dLng=(p2.lng-p1.lng)*Math.PI/180;
    const a=Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(p1.lat*Math.PI/180)*Math.cos(p2.lat*Math.PI/180)*Math.sin(dLng/2)*Math.sin(dLng/2);
    distancia+=R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
  }
  // Calcular bounding box
  let minLat=pts[0].lat,maxLat=pts[0].lat,minLng=pts[0].lng,maxLng=pts[0].lng;
  pts.forEach(function(p){
    if(p.lat<minLat)minLat=p.lat;if(p.lat>maxLat)maxLat=p.lat;
    if(p.lng<minLng)minLng=p.lng;if(p.lng>maxLng)maxLng=p.lng;
  });
  // Construir URL de OpenStreetMap con marcadores
  const polyline=pts.map(function(p){return p.lat.toFixed(5)+','+p.lng.toFixed(5)}).join(';');
  const bbox=(minLng-0.005)+','+(minLat-0.005)+','+(maxLng+0.005)+','+(maxLat+0.005);
  // Usar OpenStreetMap embed
  const osmUrl='https://www.openstreetmap.org/export/embed.html?bbox='+bbox+'&layer=mapnik&marker='+pts[0].lat+','+pts[0].lng;

  // Modal con información y enlace al mapa completo
  const w=window.open();
  if(!w){toast('Permite ventanas emergentes para ver el mapa');return}
  const ttl=sal?(sal.origen+' → '+sal.destino):'Track GPS';
  let html='<!DOCTYPE html><html><head><title>'+ttl+'</title><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">';
  html+='<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>';
  html+='<style>body{margin:0;font-family:system-ui,sans-serif}#map{height:calc(100vh - 80px);width:100%}.info{padding:12px 16px;background:#1A1F12;color:#fff;display:flex;gap:20px;flex-wrap:wrap;align-items:center;justify-content:space-between}.info h2{margin:0;font-size:16px}.stats{display:flex;gap:14px;font-size:13px}.stats span{background:rgba(255,255,255,.15);padding:4px 10px;border-radius:6px}</style></head><body>';
  html+='<div class="info"><h2>'+ttl+'</h2><div class="stats">';
  html+='<span>📍 '+pts.length+' puntos</span>';
  html+='<span>📏 '+distancia.toFixed(2)+' km recorridos</span>';
  if(sal&&sal.conductorNombre)html+='<span>👤 '+sal.conductorNombre+'</span>';
  html+='</div></div>';
  html+='<div id="map"></div>';
  html+='<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"><\/script>';
  html+='<script>';
  html+='var map=L.map("map");';
  html+='L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{maxZoom:19,attribution:"© OpenStreetMap"}).addTo(map);';
  html+='var pts='+JSON.stringify(pts.map(function(p){return [p.lat,p.lng,p.fecha,p.speed]}))+';';
  html+='var latlngs=pts.map(function(p){return [p[0],p[1]]});';
  html+='var poly=L.polyline(latlngs,{color:"#E24B4A",weight:4,opacity:0.8}).addTo(map);';
  html+='L.marker(latlngs[0]).addTo(map).bindPopup("<b>Inicio</b><br>"+new Date(pts[0][2]).toLocaleString("es-ES"));';
  html+='L.marker(latlngs[latlngs.length-1]).addTo(map).bindPopup("<b>Final</b><br>"+new Date(pts[pts.length-1][2]).toLocaleString("es-ES"));';
  html+='pts.forEach(function(p,i){if(i>0&&i<pts.length-1)L.circleMarker([p[0],p[1]],{radius:3,color:"#E24B4A",fillOpacity:0.6}).addTo(map).bindPopup(new Date(p[2]).toLocaleString("es-ES")+(p[3]?"<br>"+p[3]+" km/h":""))});';
  html+='map.fitBounds(poly.getBounds(),{padding:[20,20]});';
  html+='<\/script></body></html>';
  w.document.write(html);
  w.document.close();
}

// ═══════════ TEMA OSCURO ═══════════
function applyTheme(){
  const saved=localStorage.getItem('pma3_theme')||'auto';
  const root=document.documentElement;
  root.classList.remove('auto-theme','dark-theme','light-theme');
  root.classList.add(saved+'-theme');
  // Actualizar icono del botón
  const btn=document.getElementById('theme-toggle-btn');
  if(btn){
    const isDark=saved==='dark'||(saved==='auto'&&window.matchMedia('(prefers-color-scheme: dark)').matches);
    btn.innerHTML=isDark
      ?'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>'
      :'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
  }
}
function toggleTheme(){
  const current=localStorage.getItem('pma3_theme')||'auto';
  // Ciclo: auto -> dark -> light -> auto
  const next=current==='auto'?'dark':current==='dark'?'light':'auto';
  localStorage.setItem('pma3_theme',next);
  applyTheme();
  toast('Tema: '+(next==='auto'?'automático':next==='dark'?'oscuro':'claro'));
}
// Detectar cambios del sistema
if(window.matchMedia){
  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change',function(){
    if((localStorage.getItem('pma3_theme')||'auto')==='auto')applyTheme();
  });
}

// ═══════════ BÚSQUEDA GLOBAL ═══════════
function openGlobalSearch(){
  let overlay=document.getElementById('gs-overlay');
  if(overlay){overlay.remove();return}
  overlay=document.createElement('div');
  overlay.id='gs-overlay';
  overlay.className='gs-overlay';
  overlay.innerHTML='<div class="gs-modal"><div class="gs-input-wrap"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input type="text" id="gs-input" class="gs-input" placeholder="Buscar en toda la app..." autocomplete="off"></div><div class="gs-results" id="gs-results"><div class="gs-empty">Escribe para buscar en tareas, incidencias, manuales, FAQs, personal, rutas y caducidades...</div></div><div class="gs-hint">Esc para cerrar · Ctrl+K para abrir/cerrar</div></div>';
  overlay.onclick=function(e){if(e.target===overlay)closeGlobalSearch()};
  document.body.appendChild(overlay);
  setTimeout(function(){const inp=document.getElementById('gs-input');if(inp){inp.focus();inp.addEventListener('input',function(){runGlobalSearch(this.value)})}},50);
}
function closeGlobalSearch(){const o=document.getElementById('gs-overlay');if(o)o.remove()}
function runGlobalSearch(q){
  const results=document.getElementById('gs-results');
  if(!results)return;
  q=q.trim().toLowerCase();
  if(!q){results.innerHTML='<div class="gs-empty">Escribe para buscar en tareas, incidencias, manuales, FAQs, personal, rutas y caducidades...</div>';return}
  const sections=[];
  // Tareas
  const tareas=(ST.tasks||[]).filter(function(t){return (t.title||'').toLowerCase().includes(q)||(t.description||'').toLowerCase().includes(q)}).slice(0,8);
  if(tareas.length)sections.push({title:'Tareas',color:'#378ADD',items:tareas.map(function(t){return {label:t.title,sub:t.status,onclick:"closeGlobalSearch();ST.tab='tareas';ST.modal={type:'viewTask',id:'"+t.id+"'};render()"}})});
  // Incidencias
  const incs=(ST.incidents||[]).filter(function(i){return (i.title||'').toLowerCase().includes(q)||(i.description||'').toLowerCase().includes(q)||(i.category||'').toLowerCase().includes(q)}).slice(0,8);
  if(incs.length)sections.push({title:'Incidencias',color:'#D4537E',items:incs.map(function(i){return {label:i.title,sub:i.category+' · '+i.status,onclick:"closeGlobalSearch();ST.tab='incidencias';ST.modal={type:'viewIncident',id:'"+i.id+"'};render()"}})});
  // Manuales
  const mans=(ST.manuals||[]).filter(function(m){return (m.name||'').toLowerCase().includes(q)}).slice(0,8);
  if(mans.length)sections.push({title:'Manuales',color:'#1D9E75',items:mans.map(function(m){return {label:m.name,sub:'Abrir documento',onclick:"closeGlobalSearch();window.open('"+m.url+"','_blank')"}})});
  // FAQs
  const faqs=(ST.faqs||[]).filter(function(f){return (f.question||'').toLowerCase().includes(q)||(f.answer||'').toLowerCase().includes(q)}).slice(0,8);
  if(faqs.length)sections.push({title:'FAQs',color:'#7F77DD',items:faqs.map(function(f){return {label:f.question,sub:(f.answer||'').slice(0,60),onclick:"closeGlobalSearch();ST.tab='faqs';render()"}})});
  // Personal
  const personas=(ST.personnel||[]).filter(function(p){return (p.name||'').toLowerCase().includes(q)}).slice(0,8);
  if(personas.length)sections.push({title:'Personal',color:'#E8A817',items:personas.map(function(p){return {label:p.name,sub:p.group+(p.driver?' · Conductor':''),onclick:"closeGlobalSearch();ST.tab='personal';render()"}})});
  // Rutas
  const rutas=(ST.routes||[]).filter(function(r){return (r.name||'').toLowerCase().includes(q)||(r.description||'').toLowerCase().includes(q)}).slice(0,8);
  if(rutas.length)sections.push({title:'Rutas',color:'#1FB04D',items:rutas.map(function(r){return {label:r.name,sub:(r.distance||'')+(r.difficulty?' · '+r.difficulty:''),onclick:"closeGlobalSearch();ST.tab='rutas';render()"}})});
  // Caducidades
  const cads=(ST.caducidades||[]).filter(function(c){return (c.nombre||'').toLowerCase().includes(q)||(c.descripcion||'').toLowerCase().includes(q)}).slice(0,8);
  if(cads.length)sections.push({title:'Caducidades',color:'#A32D2D',items:cads.map(function(c){return {label:c.nombre,sub:c.fecha?'Vence: '+c.fecha.slice(0,10):'Sin fecha',onclick:"closeGlobalSearch();ST.tab='caducidades';render()"}})});
  // Salidas
  const sals=(ST.salidas||[]).filter(function(s){return (s.destino||'').toLowerCase().includes(q)||(s.conductorNombre||'').toLowerCase().includes(q)||(s.motivo||'').toLowerCase().includes(q)}).slice(0,8);
  if(sals.length)sections.push({title:'Salidas',color:'#854F0B',items:sals.map(function(s){return {label:s.origen+' → '+s.destino,sub:s.conductorNombre+' · '+s.estado,onclick:"closeGlobalSearch();ST.tab='salidas';ST.modal={type:'viewSalida',id:'"+s.id+"'};render()"}})});

  if(!sections.length){results.innerHTML='<div class="gs-empty">No se encontraron resultados para "'+esc(q)+'"</div>';return}
  let html='';
  sections.forEach(function(sec){
    html+='<div class="gs-section"><div class="gs-section-title">'+sec.title+' ('+sec.items.length+')</div>';
    sec.items.forEach(function(it){
      html+='<div class="gs-result" onclick="'+it.onclick+'"><div class="gs-result-icon" style="background:'+sec.color+'">'+sec.title.charAt(0)+'</div><div style="flex:1;min-width:0"><div style="font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(it.label)+'</div><div style="font-size:12px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(it.sub||'')+'</div></div></div>';
    });
    html+='</div>';
  });
  results.innerHTML=html;
}
// Atajo de teclado Ctrl+K
document.addEventListener('keydown',function(e){
  if((e.ctrlKey||e.metaKey)&&e.key==='k'){e.preventDefault();openGlobalSearch()}
  if(e.key==='Escape'){closeGlobalSearch()}
});

// ═══════════ TRACKING GPS DE SALIDAS ═══════════
let gpsTrackingId=null;let gpsCurrentSalida=null;
function startGpsTracking(salidaId){
  if(!navigator.geolocation){toast('GPS no disponible');return}
  if(gpsTrackingId){stopGpsTracking()}
  gpsCurrentSalida=salidaId;
  // Capturar posición inmediatamente
  captureGpsPoint();
  // Y luego cada 5 minutos
  gpsTrackingId=setInterval(captureGpsPoint,5*60*1000);
  // Guardar en localStorage para persistir si se recarga
  localStorage.setItem('pma3_gps_tracking',salidaId);
  showTrackingBar(true);
  toast('Tracking GPS activado');
}
function stopGpsTracking(){
  if(gpsTrackingId){clearInterval(gpsTrackingId);gpsTrackingId=null}
  gpsCurrentSalida=null;
  localStorage.removeItem('pma3_gps_tracking');
  showTrackingBar(false);
}
function captureGpsPoint(){
  if(!gpsCurrentSalida)return;
  navigator.geolocation.getCurrentPosition(
    async function(pos){
      const point={
        id:'gps-'+Date.now(),
        salidaId:gpsCurrentSalida,
        lat:pos.coords.latitude,
        lng:pos.coords.longitude,
        accuracy:Math.round(pos.coords.accuracy||0),
        speed:pos.coords.speed!=null?Math.round(pos.coords.speed*3.6):0,
        fecha:new Date().toISOString()
      };
      try{await cloud('addGpsPoint',{point})}catch(e){}
      if(!ST.gpsPoints)ST.gpsPoints=[];
      ST.gpsPoints.push(point);
      cacheLocal();
    },
    function(err){console.warn('GPS error:',err.message)},
    {enableHighAccuracy:true,timeout:30000,maximumAge:60000}
  );
}
function showTrackingBar(show){
  let bar=document.getElementById('tracking-bar');
  if(!bar){
    bar=document.createElement('div');
    bar.id='tracking-bar';
    bar.className='tracking-bar';
    document.body.appendChild(bar);
  }
  if(show){
    const sal=ST.salidas.find(function(s){return s.id===gpsCurrentSalida});
    bar.innerHTML='<span>📍 Tracking GPS activo'+(sal?' — '+esc(sal.destino):'')+'</span><button onclick="stopGpsTracking()">Detener</button>';
    bar.style.display='flex';
  }else{
    bar.style.display='none';
  }
}
// Restaurar tracking si se recarga la página durante una salida
function restoreGpsTracking(){
  const saved=localStorage.getItem('pma3_gps_tracking');
  if(saved){
    // Verificar que la salida sigue en curso
    const sal=(ST.salidas||[]).find(function(s){return s.id===saved});
    if(sal&&sal.estado==='en_ruta'){
      startGpsTracking(saved);
    }else{
      localStorage.removeItem('pma3_gps_tracking');
    }
  }
}

// ═══════════ SERVICE WORKER (PWA) ═══════════
if('serviceWorker' in navigator){
  window.addEventListener('load',function(){
    navigator.serviceWorker.register('sw.js').catch(function(e){console.log('SW registration failed:',e)});
  });
}

// ═══════════ PWA INSTALL PROMPT ═══════════
let deferredInstallPrompt=null;
window.addEventListener('beforeinstallprompt',function(e){
  e.preventDefault();
  deferredInstallPrompt=e;
  // Mostrar botón de instalación
  showInstallButton();
});
window.addEventListener('appinstalled',function(){
  deferredInstallPrompt=null;
  hideInstallButton();
  toast('App instalada correctamente');
});
function showInstallButton(){
  // No mostrar si ya está instalada
  if(window.matchMedia('(display-mode: standalone)').matches)return;
  if(window.navigator.standalone===true)return;
  let btn=document.getElementById('install-pwa-btn');
  if(btn)return;
  btn=document.createElement('button');
  btn.id='install-pwa-btn';
  btn.innerHTML='<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Instalar app';
  btn.style.cssText='position:fixed;bottom:20px;right:20px;background:#18903d;color:#fff;border:none;padding:12px 20px;border-radius:24px;font-size:14px;font-weight:600;cursor:pointer;box-shadow:0 8px 24px rgba(0,0,0,.2);z-index:997;display:flex;align-items:center;gap:8px;font-family:inherit;animation:fadeIn .3s ease';
  btn.onclick=async function(){
    if(!deferredInstallPrompt){toast('Instalación no disponible');return}
    deferredInstallPrompt.prompt();
    const result=await deferredInstallPrompt.userChoice;
    if(result.outcome==='accepted'){
      toast('Instalando...');
      hideInstallButton();
    }
    deferredInstallPrompt=null;
  };
  document.body.appendChild(btn);
}
function hideInstallButton(){
  const btn=document.getElementById('install-pwa-btn');
  if(btn)btn.remove();
}
// Ocultar si ya está instalada al cargar
if(window.matchMedia('(display-mode: standalone)').matches||window.navigator.standalone===true){
  hideInstallButton();
}

// ═══════════ ARRANQUE ═══════════
(function(){
  applyTheme();
  const saved=localStorage.getItem('pma3_session');
  if(saved){try{currentUser=JSON.parse(saved)}catch(e){}}
  try{const oq=localStorage.getItem('pma3_offline_queue');if(oq)ST.offlineQueue=JSON.parse(oq)}catch(e){}
  if(currentUser){loadData().then(function(){restoreGpsTracking()})}else{renderLogin()}
})();
</script>
